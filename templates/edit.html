{% extends "base.html" %}

{% block content %}
<h2>Edit Expense</h2>

<form method="POST">
    Amount: <input type="number" step="0.01" name="amount" value="{{ exp.amount }}"><br>
    Category: <input type="text" name="category" value="{{ exp.category }}"><br>
    Note: <input type="text" name="note" value="{{ exp.note }}"><br>
    <button type="submit">Update</button>
</form>

{% endblock %}
